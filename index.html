<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sintaxis de CSS</title>
</head>
<body>
	<div>
		<h1>Hola</h1>
		<p>Esto es un párrafo</p>
	</div>

	<!-- Estilos -->
	<style>

		/*
			Sintáxis básica de CSS

			// El selector indica a qué elemento se
			// le aplicarán los estilos

			selector
			{
				// Cada propiedad define un aspecto del
				// estilo de un elemento

				nombrePropiedad: valor;
				...
			}
		*/

		/* Elige todos los elementos de tipo "h1". */
		h1
		{
			/* Color del texto */
			color: red;
		}

		/* Elige todos los elementos de tipo "p". */
		p
		{
			/* Color del texto */
			color: blue;
		}

	</style>

</body>
</html>
