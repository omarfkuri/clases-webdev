<!--
Estructura básica

La siguiente estructura es la esperada por
los navegadores.
-->

<!-- Indica el tipo de documento -->
<!DOCTYPE html>

<!-- Define el elemento 'raíz' de la página -->
<!-- Se indica el lenguaje en el que está el contenido -->
<html lang="es">

<!--
Contiene elementos que definen características de la página.
Estos no se mostrarán en pantalla.
-->
<head>

	<!-- Definen el tipo de caracteres -->
	<meta charset="UTF-8">

	<!-- Define el como controlar el tamaño y escalamiento de la página en los dispositivos -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- El título de la página. Puede observarse en la pestaña que contiene a la página en el navegador. -->
	<title>Título</title>
</head>

<!--
Aquí se encuentran los contenidos de la página.
-->
<body>
	<h1>Hola mundo</h1>
	<p>Esta es una página web</p>
	
</body>
</html>
