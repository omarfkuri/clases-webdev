<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<!--
	Hasta aquí hemos puesto los estilos
	(y en el ejemplo anterior el script)
	dentro del mismo archivo. Estos se
	pueden separar en varios archivos
	para simplificar el desarrollo.
	-->

	<!-- Se define una hoja de estilos externa -->
	<link rel="stylesheet" href="/css/style.css">

	<!--
	Se define un script externo. El atributo "defer"
	indica que el código cargará después de cargar
	el contenido de la página.
	-->
	<script src="/js/script.js" defer></script>

	<title>Links externos</title>
</head>
<body>
	
	<h1>Hola mundo</h1>

	<button>Dar click</button>

</body>
</html>
