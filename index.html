<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>

	<!--
	Generar la estructura de abajo con Emmet:
	
	.contenedor>((.arriba>.titulo+button.indicador)+.menu>.item*4)
	-->

	<div class="contenedor closed">
		<div class="arriba">
			<div class="titulo">
				Mi menú
			</div>
			<button class="indicador"></button>
		</div>
		<div class="menu">
			<div class="item">Item 1</div>
			<div class="item">Item 2</div>
			<div class="item">Item 3</div>
			<div class="item">Item 4</div>
		</div>
	</div>

	<style>
		.contenedor
		{
			/*Define el tipo de posicionamiento*/
			display: flex;

			/*Dirección de posicionamiento de hijos*/
			flex-direction: column;
		}
		
		.arriba
		{
			display: flex;
			flex-direction: row;

			/*Como alinear los objectos horizontalmente*/
			/*center, end, start, space-between, space-around*/
			justify-content: space-between;

			/*Como alinear los objectos verticalmente*/
			align-items: center;

			/*Añade espacio a los lados*/
			padding: 5px;

			border: 1px solid #000;

			background: #444;
			color: white;
		}

		.arriba .titulo
		{
			font-weight: bold;
		}

		.arriba .indicador
		{
			all: unset;
			cursor: pointer;
		}

		.arriba .indicador::after
		{
			content: "–";
		}

		.contenedor.closed .indicador::after
		{
			content: "+";
		}

		.menu
		{
			display: flex;
			flex-direction: column;

			border: 1px solid #000;
		}

		.contenedor.closed .menu
		{
			display: none;
		}

		.menu .item
		{
			padding: 5px;
			
			border-bottom: 1px solid #444;
		}

	</style>

	<script>
		// Se pueden usar los mismos selectores que en CSS
		const button = document.querySelector(".indicador");

		button.onclick = function()
		{
			const menu = document.querySelector(".contenedor");

			if (menu.classList.contains("closed"))
			{
				menu.classList.remove("closed");
			}
			else
			{
				menu.classList.add("closed");
			}

			// Lo mismo que lo anterior
			// menu.classList.toggle("closed");
		};

	</script>

</body>
</html>
