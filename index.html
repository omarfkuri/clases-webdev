<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Emmet</title>
</head>
<body>
	
	<!-- 
	Emmet (incluido con VSCode)

	Plugin que permite definir plantillas para
	generar HTML o CSS más rápido.
	-->
	
	<!-- div -->
	<div></div>

	<!-- div+input -->
	<div></div>
	<input type="text">

	<!-- div*2 -->
	<div></div>
	<div></div>

	<!-- div[attr=jajaja] -->
	<div attr="jajaja"></div>

	<!-- div>(input+button) -->
	<div>
		<input type="text">
		<button></button>
	</div>

	<!-- .algo -->
	<div class="algo"></div>

	<!-- .algo.otra.cosa -->
	<div class="algo otra cosa"></div>

	<!-- #identificador -->
	<div id="identificador"></div>

	<style>
		
		.algo
		{
			/*w100*/
			width: 100px;

			/*w100p*/
			width: 100%;

			/*bd*/
			border: 1px solid #000;
		}

	</style>
</body>
</html>
