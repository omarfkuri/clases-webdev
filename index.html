<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Clases e identificadores</title>
</head>
<body>
	<div>
		
		<!-- Los identificadores le dan un nombre único a un elemento. -->
		<div id="uno">Hola</div>
		
		<!-- Las clases agrupan varios elementos bajo una propiedad compartida. -->
		<div class="caja">Caja uno</div>

		<!-- Pueden tener más de una clase -->
		<div class="caja abierta">Caja dos</div>

	</div>

	<style>

		/* Elige el elemento con el identificador "uno". */
		#uno
		{
			color: blue;
		}

		/* Elige todos los elementos con la clase "caja". */
		.caja
		{
			/* Agregar un borde */
			border: 3px solid black;
		}

		/* Elige todos los elementos con la clase "abierta". */
		.abierta
		{
			/* Color del borde */
			border-color: green;
		}

	</style>

</body>
</html>
